<div class="dual-pie">
  <div class="pie-group">
    <div>
      <h3 class="viz-title">Split by category</h3>
      <p class="viz-subtitle">100% = total value</p>
      <div class="pie-chart" style="--part-1: 49%; --part-2: 91%; --part-3: 97%"></div>
    </div>
    <div class="part-legend">
      <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-1-color, var(--color-text))"></span><div><strong>Segment A</strong><span>49%</span></div></div>
      <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-2-color, var(--color-accent))"></span><div><strong>Segment B</strong><span>42%</span></div></div>
      <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-3-color, color-mix(in srgb, var(--color-accent) 60%, var(--color-bg)))"></span><div><strong>Segment C</strong><span>6%</span></div></div>
      <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-4-color, color-mix(in srgb, var(--color-accent) 24%, var(--color-bg)))"></span><div><strong>Segment D</strong><span>3%</span></div></div>
    </div>
  </div>
  <div class="pie-group">
    <div>
      <h3 class="viz-title">Split by channel</h3>
      <p class="viz-subtitle">100% = total value</p>
      <div class="pie-chart" style="--part-1: 56%; --part-2: 100%; --part-3: 100%"></div>
    </div>
    <div class="part-legend">
      <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-1-color, var(--color-text))"></span><div><strong>Channel A</strong><span>56%</span></div></div>
      <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-2-color, var(--color-accent))"></span><div><strong>Channel B</strong><span>44%</span></div></div>
    </div>
  </div>
</div>
