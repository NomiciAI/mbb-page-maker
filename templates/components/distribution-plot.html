<div class="distribution-plot">
  <div class="distribution-bars" aria-label="Distribution histogram">
    <span style="--h: 18%"></span>
    <span style="--h: 34%"></span>
    <span style="--h: 56%"></span>
    <span style="--h: 88%"></span>
    <span style="--h: 72%"></span>
    <span style="--h: 46%"></span>
    <span style="--h: 25%"></span>
  </div>
  <div class="distribution-summary">
    <div class="distribution-box">
      <span class="distribution-whisker" style="--min: 14%; --max: 88%"></span>
      <span class="distribution-iqr" style="--min: 38%; --max: 66%"></span>
      <span class="distribution-median" style="--value: 54%"></span>
    </div>
    <div class="distribution-scale"><span>Low</span><span>Median</span><span>High</span></div>
  </div>
</div>
