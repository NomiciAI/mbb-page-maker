<div class="range-comparison">
  <div class="range-labels">
    <div class="range-row-label">Benchmark A</div>
    <div class="range-row-label">Benchmark B</div>
    <div class="range-row-label">Benchmark C</div>
    <div class="range-row-label">Benchmark D</div>
  </div>
  <div class="range-plot">
    <div class="range-axis-row"><span class="range-band" style="--min: 18%; --max: 58%"></span><span class="range-marker" style="--value: 42%"></span></div>
    <div class="range-axis-row"><span class="range-band" style="--min: 36%; --max: 84%"></span><span class="range-marker" style="--value: 64%"></span></div>
    <div class="range-axis-row"><span class="range-band" style="--min: 22%; --max: 72%"></span><span class="range-marker" style="--value: 30%"></span></div>
    <div class="range-axis-row"><span class="range-band" style="--min: 48%; --max: 92%"></span><span class="range-marker" style="--value: 76%"></span></div>
    <div class="range-scale"><span>Low</span><span>Mid</span><span>High</span></div>
  </div>
  <div class="range-notes">
    <div class="range-note">Current value sits inside the observed peer range.</div>
    <div class="range-note">Wide range indicates inconsistent peer outcomes.</div>
    <div class="range-note">Current value is near the lower end of range.</div>
    <div class="range-note">Current value is above median but below top quartile.</div>
  </div>
</div>
