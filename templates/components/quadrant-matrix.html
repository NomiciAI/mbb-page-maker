<div class="quadrant-matrix">
  <div class="quadrant-figure" aria-label="2 by 2 quadrant matrix">
    <div class="quadrant-side-label is-top">High</div>
    <div class="quadrant-side-label is-bottom">Low</div>
    <div class="quadrant-side-label is-left">Low</div>
    <div class="quadrant-side-label is-right">High</div>
    <div class="quadrant-axis is-y">Vertical dimension</div>
    <div class="quadrant-axis is-x">Horizontal dimension</div>
    <div class="quadrant-grid">
      <div class="quadrant-cell">
        <div><strong>Quadrant one</strong><span>Monitor selectively</span></div>
      </div>
      <div class="quadrant-cell is-focus">
        <div><strong>Quadrant two</strong><span>Priority area</span></div>
      </div>
      <div class="quadrant-cell">
        <div><strong>Quadrant four</strong><span>Lower urgency</span></div>
      </div>
      <div class="quadrant-cell">
        <div><strong>Quadrant three</strong><span>Manage tightly</span></div>
      </div>
    </div>
    <span class="quadrant-point" style="--x: 42%; --y: 70%"></span>
    <span class="quadrant-point" style="--x: 74%; --y: 57%"></span>
    <span class="quadrant-point" style="--x: 25%; --y: 24%"></span>
    <span class="quadrant-point" style="--x: 77%; --y: 24%"></span>
  </div>
  <div class="viz-legend">
    <span class="viz-legend-item"><span class="viz-swatch is-dot"></span>Data point</span>
    <span class="viz-legend-item"><span class="viz-swatch" style="--swatch: var(--color-accent-soft)"></span>Focus quadrant</span>
  </div>
</div>
