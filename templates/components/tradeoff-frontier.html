<div class="tradeoff-frontier">
  <div class="tradeoff-plot" aria-label="Tradeoff frontier">
    <span class="tradeoff-grid"></span>
    <span class="tradeoff-frontier-line"></span>
    <span class="tradeoff-point" style="--x: 22%; --y: 30%">A</span>
    <span class="tradeoff-point" style="--x: 42%; --y: 54%">B</span>
    <span class="tradeoff-point is-best" style="--x: 66%; --y: 68%">C</span>
    <span class="tradeoff-point" style="--x: 82%; --y: 62%">D</span>
    <span class="tradeoff-axis is-x">Higher value</span>
    <span class="tradeoff-axis is-y">Lower risk</span>
  </div>
  <aside class="tradeoff-legend">
    <strong>Frontier logic</strong>
    <span>Options below the line are dominated by alternatives with better value/risk balance.</span>
  </aside>
</div>
