<div class="part-to-whole">
  <div class="donut-chart" style="--part-1: 30%; --part-2: 55%; --part-3: 75%">
    <div class="donut-center"><strong>Portfolio mix</strong></div>
  </div>
  <div class="part-legend">
    <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-1-color, var(--color-text))"></span><div><strong>Segment A</strong><span>Largest share of current mix</span></div></div>
    <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-2-color, var(--color-accent))"></span><div><strong>Segment B</strong><span>Secondary allocation</span></div></div>
    <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-3-color, color-mix(in srgb, var(--color-accent) 60%, var(--color-bg)))"></span><div><strong>Segment C</strong><span>Medium-term allocation</span></div></div>
    <div class="part-legend-item"><span class="viz-swatch is-dot" style="--swatch: var(--part-4-color, color-mix(in srgb, var(--color-accent) 24%, var(--color-bg)))"></span><div><strong>Segment D</strong><span>Smaller allocation</span></div></div>
  </div>
</div>
