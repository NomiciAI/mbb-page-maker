<div class="dot-scale-comparison">
  <div class="dot-scale-panel">
    <div class="dot-scale-row">
      <div class="dot-scale-label">Offer A</div>
      <div class="dot-track" style="--value: 24%"></div>
      <div class="dot-scale-value">Lower</div>
    </div>
    <div class="dot-scale-row">
      <div class="dot-scale-label">Offer B</div>
      <div class="dot-track" style="--value: 54%"></div>
      <div class="dot-scale-value">Midpoint</div>
    </div>
    <div class="dot-scale-row">
      <div class="dot-scale-label">Offer C</div>
      <div class="dot-track" style="--value: 82%"></div>
      <div class="dot-scale-value">Higher</div>
    </div>
    <div class="dot-scale-row">
      <div class="dot-scale-label">Offer D</div>
      <div class="dot-track" style="--value: 68%"></div>
      <div class="dot-scale-value">Above peer</div>
    </div>
  </div>
  <div class="dot-scale-note">
    <strong>Dot-scale comparison</strong>
    <span>Use for relative positioning across a shared scale when exact values are less important than ordering and spread.</span>
  </div>
</div>
