<div class="competency-chart">
  <div>
    <h3 class="viz-title">Capability assessment</h3>
    <p class="viz-subtitle">Current and target levels across capabilities</p>
  </div>
  <div class="competency-grid">
    <div class="competency-head">Group</div>
    <div class="competency-head">Capability</div>
    <div class="competency-head">Gap</div>
    <div class="competency-head">Level 1-4</div>

    <div class="competency-cell is-group">Strategy</div>
    <div class="competency-cell">Market sensing</div>
    <div class="competency-cell is-gap">+1</div>
    <div class="competency-cell">
      <div class="competency-scale">
        <span class="competency-tick">1</span><span class="competency-tick">2</span><span class="competency-tick">3</span><span class="competency-tick">4</span>
        <span class="competency-marker" style="--value: 38%"></span><span class="competency-marker is-target" style="--value: 66%"></span>
      </div>
    </div>

    <div class="competency-cell is-group">Strategy</div>
    <div class="competency-cell">Portfolio choices</div>
    <div class="competency-cell is-gap">+2</div>
    <div class="competency-cell">
      <div class="competency-scale">
        <span class="competency-tick">1</span><span class="competency-tick">2</span><span class="competency-tick">3</span><span class="competency-tick">4</span>
        <span class="competency-marker" style="--value: 22%"></span><span class="competency-marker is-target" style="--value: 72%"></span>
      </div>
    </div>

    <div class="competency-cell is-group">Execution</div>
    <div class="competency-cell">Operating cadence</div>
    <div class="competency-cell is-gap">+1</div>
    <div class="competency-cell">
      <div class="competency-scale">
        <span class="competency-tick">1</span><span class="competency-tick">2</span><span class="competency-tick">3</span><span class="competency-tick">4</span>
        <span class="competency-marker" style="--value: 52%"></span><span class="competency-marker is-target" style="--value: 78%"></span>
      </div>
    </div>

    <div class="competency-cell is-group">Execution</div>
    <div class="competency-cell">Performance management</div>
    <div class="competency-cell is-gap">0</div>
    <div class="competency-cell">
      <div class="competency-scale">
        <span class="competency-tick">1</span><span class="competency-tick">2</span><span class="competency-tick">3</span><span class="competency-tick">4</span>
        <span class="competency-marker" style="--value: 68%"></span><span class="competency-marker is-target" style="--value: 68%"></span>
      </div>
    </div>
  </div>
  <div class="viz-legend">
    <span class="viz-legend-item"><span class="competency-marker" style="position: static; transform: none"></span>Current</span>
    <span class="viz-legend-item"><span class="competency-marker is-target" style="position: static; transform: none"></span>Target</span>
  </div>
</div>
