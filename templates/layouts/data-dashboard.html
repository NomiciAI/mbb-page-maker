<section class="slide" data-title="Data dashboard">
  <header>
    <div class="slide-kicker">Performance dashboard</div>
    <h2 class="slide-title">A dashboard page combines headline metrics with the two exhibits that explain movement</h2>
  </header>
  <div class="content dashboard-grid">
    <div class="metric-strip">
      <div class="metric"><strong>18%</strong><span>Growth.</span></div>
      <div class="metric"><strong>3x</strong><span>Spread.</span></div>
      <div class="metric"><strong>42</strong><span>Items.</span></div>
      <div class="metric"><strong>12m</strong><span>Window.</span></div>
    </div>
    <div class="card">
      <h3>Ranked drivers</h3>
      <div class="ranked-bars">
        <div class="rank-row"><div class="rank-num">1</div><div class="bar-label">Segment A</div><div class="rank-track"><div class="rank-fill" style="--value: 92%"></div></div><div class="bar-value">92</div></div>
        <div class="rank-row"><div class="rank-num">2</div><div class="bar-label">Segment B</div><div class="rank-track"><div class="rank-fill" style="--value: 74%"></div></div><div class="bar-value">74</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Opportunity map</h3>
      <div class="scatter">
        <div class="axis-y">Attractiveness</div><div class="axis-x">Right to win</div>
        <div class="point" style="--x: 72%; --y: 74%" data-label="A"></div>
        <div class="point" style="--x: 42%; --y: 62%" data-label="B"></div>
        <div class="point" style="--x: 58%; --y: 36%" data-label="C"></div>
      </div>
    </div>
  </div>
  <footer class="footer">
    <span>Layout: data dashboard</span>
    <span class="page-number"></span>
  </footer>
</section>
