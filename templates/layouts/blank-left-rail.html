<section class="slide" data-title="Blank left rail">
  <header>
    <h2 class="slide-title">Page title goes here</h2>
    <div class="slide-rule"></div>
  </header>
  <div class="content">
    <div class="region-layout left-rail">
      <aside class="region has-frame-lines">
        <div class="region-body safe-stack">
          <h2 class="region-title">Context</h2>
          <p class="region-copy">Use this narrow rail for page context, agenda markers, filters, or one compact note.</p>
        </div>
      </aside>
      <main class="region is-muted has-frame-lines">
        <div class="region-body safe-stack">
          <h2 class="region-title">Primary exhibit</h2>
          <p class="region-copy">Insert one dominant component: chart, table, comparison, issue tree, or structured evidence block.</p>
        </div>
      </main>
    </div>
  </div>
  <footer class="footer">
    <span>Working draft</span>
    <span class="page-number"></span>
  </footer>
</section>
